    .body { font-family: 'Source Sans 3 Light', 'Source Sans 3', 'Source Sans Pro', 'Helvetica Neue', sans-serif; font-weight: 300; }
    .body-medium { font-family: 'Source Sans 3', 'Source Sans Pro', 'Helvetica Neue', sans-serif; font-weight: 400; }
    .handle { font-family: 'Josefin Sans', 'Helvetica Neue', sans-serif; font-weight: 700; letter-spacing: 0.10em; font-size: 18px; }
    .stat-display { font-family: 'Brandon Grotesque', 'Josefin Sans', 'Helvetica Neue', sans-serif; font-weight: 700; }
    .quote-mark { font-family: Georgia, 'Times New Roman', serif; }
  </style>
