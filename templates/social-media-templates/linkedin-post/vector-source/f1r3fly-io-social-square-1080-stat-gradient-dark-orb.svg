  <title>F1R3FLY.IO — Stat (gradient)</title>
  <defs>
    <linearGradient id="brand_gradient_h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F3D630"/>
      <stop offset="100%" stop-color="#3FA9F5"/>
    </linearGradient>
    <linearGradient id="bg_teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#002624"/><stop offset="100%" stop-color="#00294b"/>
    </linearGradient>
    <linearGradient id="bg_purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#002537"/><stop offset="100%" stop-color="#021135"/>
    </linearGradient>
    <!-- Orb glow: 8 stops to smooth the navy transition where banding is worst -->
    <radialGradient id="orb" cx="85.83%" cy="25.74%" r="60%" fx="100.56%" fy="25.74%">
      <stop offset="0%" stop-color="#3FA9F5" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#00294b" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <!-- Brand ellipse: 7 stops -->
    <radialGradient id="brand_ellipse_fill" cx="30%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#F3D630" stop-opacity="0.85"/>
      <stop offset="20%"  stop-color="#C8C150"  stop-opacity="0.75"/>
      <stop offset="40%"  stop-color="#85B080"  stop-opacity="0.65"/>
      <stop offset="55%"  stop-color="#5DA9C0"  stop-opacity="0.55"/>
      <stop offset="70%"  stop-color="#3FA9F5"    stop-opacity="0.40"/>
      <stop offset="85%"  stop-color="#1E5F94"  stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3FA9F5"    stop-opacity="0"/>
    </radialGradient>
    <!-- Dither: fine grayscale noise overlay at very low opacity.
         Breaks up 8-bit color bands by randomizing each pixel's rounding step.
         Standard technique used across modern UI design. -->
    <filter id="dither" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="2.5" numOctaves="2" seed="7" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.5
                             0 0 0 0 0.5
                             0 0 0 0 0.5
                             0 0 0 1 0"/>
    </filter>
      <linearGradient id="stat_grad_us" gradientUnits="userSpaceOnUse" x1="100" y1="0" x2="533.3" y2="0">
      <stop offset="0%" stop-color="#F3D630"/>
      <stop offset="100%" stop-color="#3FA9F5"/>
    </linearGradient>
  </defs>
